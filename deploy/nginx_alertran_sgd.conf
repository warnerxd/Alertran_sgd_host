# Agrega este bloque location dentro de tu server block existente en nginx.
# Archivo típico: /etc/nginx/sites-available/default  o  /etc/nginx/sites-available/deprisahermes
#
# El bloque "map" va FUERA del server block (a nivel de http {}):

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Dentro de tu server { ... } existente ─────────────────────────────────────

    # Redirige /Alertran_SGD → /Alertran_SGD/ (trailing slash)
    location = /Alertran_SGD {
        return 301 $scheme://$host/Alertran_SGD/;
    }

    # Proxy principal: HTTP + WebSocket hacia uvicorn
    # El "/" final en proxy_pass elimina el prefijo /Alertran_SGD/
    location /Alertran_SGD/ {
        proxy_pass         http://127.0.0.1:8100/;
        proxy_http_version 1.1;

        # Headers estándar
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts (WebSocket puede quedarse abierto mucho tiempo)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # Buffer desactivado para streaming de logs en tiempo real
        proxy_buffering off;
    }
